# ==============================================
# render.yaml — Blueprint Render pour portfolio-backend
# ==============================================
# Infrastructure (plan Free) :
#   - Un service web Node.js (API Express)
#   - Une base de données PostgreSQL managée
#   - Stockage des fichiers (images, CV) via Cloudinary
#
# Déploiement :
#   1. Push ce repo sur GitHub/GitLab
#   2. Sur Render → New → Blueprint
#   3. Connecter le repo → Render détecte ce fichier automatiquement
#   4. Cliquer "Apply" pour tout provisionner
#   5. Ajouter les 3 variables Cloudinary dans Environment sur Render
# ==============================================

databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio_backend
    user: portfolio_user
    region: frankfurt

services:
  - type: web
    name: portfolio-backend
    runtime: node
    region: frankfurt
    plan: free

    buildCommand: npm install
    startCommand: node server.js

    envVars:
      - key: NODE_VERSION
        value: 20

      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString

      # Cloudinary — configurer les vraies valeurs sur le dashboard Render
      - key: CLOUDINARY_CLOUD_NAME
        sync: false              # ne pas committer la valeur, la saisir sur Render
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Auth admin JWT — configurer sur le dashboard Render
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
