# ==============================================
# render.yaml — Blueprint Render pour portfolio-backend
# ==============================================
# Infrastructure (plan Free) :
#   - Un service web Node.js (API Express)
#   - Base de données PostgreSQL externe (Supabase)
#   - Stockage des fichiers (images, CV) via Cloudinary
#
# Déploiement :
#   1. Push ce repo sur GitHub/GitLab
#   2. Sur Render → New → Blueprint
#   3. Connecter le repo → Render détecte ce fichier automatiquement
#   4. Cliquer "Apply" pour tout provisionner
#   5. Ajouter les variables sur Render (Environment) :
#        - DATABASE_URL (URI Supabase — Session/Transaction pooler)
#        - les 3 variables Cloudinary
#        - les variables Auth admin (JWT)
# ==============================================


services:
  - type: web
    name: portfolio-backend
    runtime: node
    region: frankfurt
    plan: free

    buildCommand: npm install
    startCommand: node server.js

    envVars:
      - key: NODE_VERSION
        value: 20

      - key: NODE_ENV
        value: production

      - key: PORT
        value: 3000

      # Base de données PostgreSQL externe (Supabase)
      # Utiliser l'URI du "Session pooler" (compatible IPv4 Render)
      # → saisir la valeur sur le dashboard Render, ne pas la committer
      - key: DATABASE_URL
        sync: false

      # Cloudinary — configurer les vraies valeurs sur le dashboard Render
      - key: CLOUDINARY_CLOUD_NAME
        sync: false              # ne pas committer la valeur, la saisir sur Render
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # Auth admin JWT — configurer sur le dashboard Render
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
